name: iOS OTA App
project_type: ios
language: objective-c

workflows:
  build-and-export-ipa:
    name: Build iOS IPA
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app (unsigned)
        script: |
          # 在根目录构建（不要 cd 到 esp-ble-ota）
          xcodebuild build \
            -project esp-ble-ota.xcodeproj \
            -scheme esp-ble-ota \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty
          
      - name: Find and Package IPA
        script: |
          echo "=== 查找构建输出 ==="
          ls -la build/Build/Products/ 2>/dev/null || echo "Products目录不存在"
          
          # 智能查找.app文件
          APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ 找到app: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/esp-ble-ota.app
            zip -r $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa Payload/
            echo "✅ IPA创建成功:"
            ls -lh $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa
          else
            echo "❌ 错误: 未找到.app文件"
            echo "build目录结构:"
            find build -type f 2>/dev/null | head -20 || echo "build目录为空"
            exit 1
          fi
          
    artifacts:
      - $CM_BUILD_DIR/*.ipa