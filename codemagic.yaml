name: iOS OTA App
project_type: ios
language: objective-c

workflows:
  build-and-export-ipa:
    name: Build iOS IPA
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app (unsigned)
        script: |
          cd esp-ble-ota
          
          # 使用 .xcodeproj 构建（不是 .xcworkspace）
          xcodebuild build \
            -project esp-ble-ota.xcodeproj \
            -scheme esp-ble-ota \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty
          
      - name: Package unsigned IPA
        script: |
          cd esp-ble-ota
          
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/esp-ble-ota.app Payload/ 2>/dev/null || \
          cp -r build/Build/Products/Release-iphoneos/esp-ble-ota.app Payload/
          
          if [ -d "Payload/esp-ble-ota.app" ]; then
            zip -r $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa Payload/
            echo "✅ IPA created successfully"
            ls -lh $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa
          else
            echo "❌ Error: .app not found"
            echo "Looking for .app in:"
            find build/Build/Products -name "*.app" 2>/dev/null || echo "No .app found"
            exit 1
          fi
          
    artifacts:
      - $CM_BUILD_DIR/*.ipa