name: iOS OTA App
project_type: ios
language: objective-c

workflows:
  build-and-export-ipa:
    name: Build iOS IPA
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app (unsigned)
        script: |
          cd esp-ble-ota
          
          xcodebuild build \
            -project esp-ble-ota.xcodeproj \
            -scheme esp-ble-ota \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty
          
      - name: Find and Package IPA
        script: |
          cd esp-ble-ota
          
          echo "=== 查找构建输出 ==="
          ls -la build/Build/Products/ 2>/dev/null || echo "Debug目录不存在"
          find build -name "*.app" -type d 2>/dev/null || echo "未找到.app文件"
          find build -name "esp-ble-ota*" 2>/dev/null || echo "未找到esp-ble-ota相关文件"
          
          # 尝试多种可能的路径
          APP_PATH=""
          for path in \
            "build/Build/Products/Debug-iphoneos/esp-ble-ota.app" \
            "build/Build/Products/Release-iphoneos/esp-ble-ota.app" \
            "build/Build/Products/Debug/esp-ble-ota.app"; do
            if [ -d "$path" ]; then
              APP_PATH="$path"
              break
            fi
          done
          
          # 如果还没找到，用find搜索
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "✅ 找到app: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/esp-ble-ota.app
            zip -r $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa Payload/
            echo "✅ IPA创建成功:"
            ls -lh $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa
          else
            echo "❌ 错误: 未找到.app文件"
            echo "build目录内容:"
            ls -laR build/ 2>/dev/null | head -50
            exit 1
          fi
          
    artifacts:
      - $CM_BUILD_DIR/*.ipa