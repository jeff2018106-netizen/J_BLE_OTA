name: iOS OTA App
project_type: ios
language: objective-c

workflows:
  build-and-export-ipa:
    name: Build iOS IPA
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd esp-ble-ota
          pod install
          
      - name: Build iOS app (unsigned)
        script: |
          cd esp-ble-ota
          
          xcodebuild build \
            -workspace esp-ble-ota.xcworkspace \
            -scheme esp-ble-ota \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty
          
      - name: Package unsigned IPA
        script: |
          cd esp-ble-ota
          
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/esp-ble-ota.app Payload/
          zip -r $CM_BUILD_DIR/esp-ble-ota-unsigned.ipa Payload/
          
    artifacts:
      - $CM_BUILD_DIR/*.ipa