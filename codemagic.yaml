name: iOS OTA App
project_type: ios
language: objective-c

workflows:
  build-and-export-ipa:
    name: Build iOS IPA
    environment:
      xcode: latest

    scripts:
      # ════════════════════════════════════════════════════════════════════
      # Step 1: 项目结构 + 静态信息（零 xcodebuild 调用，避免触发 Xcode 冷启动）
      #         — 每个 xcodebuild 在 Codemagic 上约耗时 2-5 分钟初始化
      # ════════════════════════════════════════════════════════════════════
      - name: "[Diag] 项目结构验证"
        script: |
          set -euo pipefail

          echo "====== macOS 版本 ======"
          sw_vers

          echo ""
          echo "====== 关键文件存在性检查 ======"
          for f in esp-ble-ota.xcodeproj esp-ble-ota/Info.plist; do
            if [ -e "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ 缺失: $f"
            fi
          done

          echo ""
          echo "====== Xcode / SDK 版本（从本地缓存读取，不触发初始化）======"
          # Xcode 安装路径（静态，不会触发任何工具执行）
          if [ -d "/Applications/Xcode.app" ]; then
            echo "Xcode.app 路径: /Applications/Xcode.app"
            # Xcode 版本通过 Info.plist 读取
            XCODE_VER=$(plutil -p "/Applications/Xcode.app/Contents/Info.plist" 2>/dev/null \
              | grep -E '"CFBundleShortVersionString"|"Xcode"' | head -4)
            echo "$XCODE_VER"
          else
            echo "  (未找到 /Applications/Xcode.app，跳过)"
          fi

          echo ""
          echo "====== Scheme 列表（从 project.pbxproj 提取，无 xcodebuild）======"
          grep -E '^\s*name\s*=' esp-ble-ota.xcodeproj/project.pbxproj \
            | sed 's/^[[:space:]]*/  /' | sort -u

          echo ""
          echo "====== 源文件统计 ======"
          echo "  .m 文件: $(find esp-ble-ota -name '*.m' 2>/dev/null | wc -l)"
          echo "  .h 文件: $(find esp-ble-ota -name '*.h' 2>/dev/null | wc -l)"

      # ════════════════════════════════════════════════════════════════════
      # Step 2: 清理旧构建目录
      # ════════════════════════════════════════════════════════════════════
      - name: "Clean build directory"
        script: |
          set -euo pipefail
          echo "====== 清理构建目录 ======"
          rm -rf build build_output.log
          mkdir -p build

      # ════════════════════════════════════════════════════════════════════
      # Step 3: 主构建 — 输出最详细 log，失败时自动打印摘要
      # ════════════════════════════════════════════════════════════════════
      - name: "Build iOS app (unsigned, full diagnostic log)"
        script: |
          set -uo pipefail   # 注意：不加 -e，由脚本自己判断 BUILD_RESULT

          echo "====== 开始 xcodebuild ======"
          echo "  Project:       esp-ble-ota.xcodeproj"
          echo "  Scheme:        esp-ble-ota"
          echo "  Configuration: Debug"
          echo "  SDK:           iphoneos"
          echo ""

          # -verbose       → 每一行编译命令都打印出来
          # -showBuildTimingSummary → 最后打印各阶段耗时，方便定位慢步骤
          # OTHER_CFLAGS   → 关闭 -Werror，避免 warning 阻断 CI
          xcodebuild build \
            -project esp-ble-ota.xcodeproj \
            -scheme esp-ble-ota \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            -showBuildTimingSummary \
            -verbose \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee build_output.log

          BUILD_RESULT=${PIPESTATUS[0]}

          echo ""
          echo "====== 构建结束，退出码: $BUILD_RESULT ======"

          if [ $BUILD_RESULT -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║   BUILD FAILED — 错误摘要如下          ║"
            echo "╚══════════════════════════════════════╝"
            echo ""
            echo "--- error: 行 (含上下文 10 行) ---"
            grep -n "error:" build_output.log | head -60 || true
            echo ""
            echo "--- Build 失败完整段落 (最后 200 行) ---"
            tail -200 build_output.log
            echo ""
            echo "--- warning: 行 (最多 40 条) ---"
            grep -n "warning:" build_output.log | head -40 || true
            exit 1
          fi

          # ── 构建成功：提取耗时摘要（不额外调用 xcodebuild）─────────────
          echo ""
          echo "====== 提取 Build Timing Summary ======"
          # -showBuildTimingSummary 的输出在 xcodebuild 结束时打印，
          # 在 tee 管道中整段落在日志末尾附近。
          # 在 log 文件中查找该段落并高亮打印。
          if grep -q "Build Timing Summary" build_output.log; then
            echo ""
            # 提取 "Build Timing Summary" 段落到下一个空行（或文件末尾）
            sed -n '/Build Timing Summary/,$p' build_output.log \
              | awk '{
                  if (/^$/) exit;
                  if (/:/) {
                    sub(/^[[:space:]]*/, "");
                    gsub(/^/, "  ");
                    print;
                  } else {
                    print;
                  }
                }'
          else
            echo "  (未在 log 中找到 Timing Summary，跳过)"
          fi

          # ── 构建成功：提取警告汇总 ─────────────────────────────────────
          WARN_COUNT=$(grep -c "warning:" build_output.log 2>/dev/null || echo "0")
          echo ""
          echo "====== 警告统计 (共 $WARN_COUNT 条) ======"
          if [ "$WARN_COUNT" -gt 0 ]; then
            grep -n "warning:" build_output.log | head -20 || true
            if [ "$WARN_COUNT" -gt 20 ]; then
              echo "  ... 还有 $((WARN_COUNT - 20)) 条警告，见完整 log"
            fi
          fi

      # ════════════════════════════════════════════════════════════════════
      # Step 4: 打包 IPA（无签名）
      # ════════════════════════════════════════════════════════════════════
      - name: "Package unsigned IPA"
        script: |
          set -euo pipefail

          echo "====== 查找 .app 文件 ======"
          find build -name "*.app" -type d 2>/dev/null | sort || true

          APP_PATH=$(find build -name "esp-ble-ota.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 esp-ble-ota.app，列出 build/Build/Products 目录："
            find build/Build/Products -maxdepth 3 2>/dev/null || echo "(目录不存在)"
            exit 1
          fi

          echo "✅ 找到 .app: $APP_PATH"
          echo "   App 大小: $(du -sh "$APP_PATH" | cut -f1)"

          IPA_DIR="$CM_BUILD_DIR"
          IPA_PATH="$IPA_DIR/esp-ble-ota-unsigned.ipa"

          # 标准 IPA 打包格式：必须是 Payload/<AppName>.app
          PAYLOAD_DIR=$(mktemp -d)
          mkdir -p "$PAYLOAD_DIR/Payload"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/Payload/esp-ble-ota.app"

          (cd "$PAYLOAD_DIR" && zip -r "$IPA_PATH" Payload/)

          echo "✅ IPA 已生成: $IPA_PATH"
          ls -lh "$IPA_PATH"

          # 同时把 log 也复制到产物目录
          cp build_output.log "$IPA_DIR/build_output.log" 2>/dev/null || true

    artifacts:
      - $CM_BUILD_DIR/*.ipa
      - $CM_BUILD_DIR/build_output.log
      # 同时保留 xcode 生成的 derived data 中的中间产物，帮助深度调试
      - build/Build/Products/**/*.app
